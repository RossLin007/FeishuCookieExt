<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feishu Cookie Sync Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-title-group">
        <img src="icons/icon-48.png" alt="Logo" class="header-logo" id="header-logo-img">
        <h1 class="main-title">Feishu Sync</h1>
      </div>
      <div class="status-badge status-idle" id="sync-status-badge">Idle</div>
    </header>

    <main class="app-main">
      <!-- Status Card -->
      <section class="card status-card">
        <div class="stat-row">
          <span class="stat-label">Last Synced:</span>
          <span class="stat-value" id="last-sync-time">Never</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Sync Mode:</span>
          <span class="stat-value" id="sync-mode">Manual</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Subdomain:</span>
          <span class="stat-value text-highlight" id="active-subdomain">Not Configured</span>
        </div>
      </section>

      <!-- Action Panel -->
      <section class="action-panel">
        <button class="btn btn-primary" id="sync-btn">
          <span class="btn-text">Sync Now</span>
          <span class="spinner hidden" id="sync-spinner"></span>
        </button>
        <button class="btn btn-icon" id="settings-toggle-btn" title="Toggle Settings">
          <svg viewBox="0 0 24 24" class="icon-svg" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
          </svg>
        </button>
      </section>

      <!-- Settings Card (Collapsible) -->
      <section class="card settings-card collapsed" id="settings-section">
        <h2 class="section-title">Configuration</h2>
        
        <div class="form-group">
          <label for="subdomain-input" class="form-label">
            Feishu Subdomain
            <span class="label-hint">(required)</span>
          </label>
          <input type="text" id="subdomain-input" class="form-input" placeholder="e.g. bytedance">
        </div>

        <div class="form-group">
          <label for="api-url-input" class="form-label">Webhook Endpoint API</label>
          <input type="url" id="api-url-input" class="form-input" placeholder="https://endpoint-url.com">
        </div>

        <button class="btn btn-secondary" id="save-settings-btn">Save Configurations</button>
      </section>

      <!-- Logs Card -->
      <section class="card logs-card">
        <div class="logs-header">
          <h2 class="section-title">Recent Activity</h2>
          <button class="btn-text-only" id="clear-logs-btn">Clear Logs</button>
        </div>
        <div class="log-container" id="log-list">
          <div class="log-empty-state" id="log-empty">No sync logs recorded yet.</div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p class="footer-text">Feishu Cookie Sync • v1.0.0</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
